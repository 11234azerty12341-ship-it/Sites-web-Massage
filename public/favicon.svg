<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Personne allongée recevant un massage -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Corps allongé (silhouette simplifiée) -->
  <ellipse cx="50" cy="60" rx="35" ry="12" fill="url(#grad)" opacity="0.8"/>

  <!-- Tête -->
  <circle cx="18" cy="55" r="10" fill="url(#grad)"/>

  <!-- Mains du masseur (deux cercles représentant les pouces) -->
  <circle cx="45" cy="50" r="6" fill="#D4A574" stroke="#8B7355" stroke-width="1"/>
  <circle cx="60" cy="50" r="6" fill="#D4A574" stroke="#8B7355" stroke-width="1"/>

  <!-- Lignes d'énergie/relaxation -->
  <path d="M 40 35 Q 50 30 60 35" stroke="#C4A484" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 35 30 Q 50 23 65 30" stroke="#C4A484" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
